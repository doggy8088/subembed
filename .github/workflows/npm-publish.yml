name: Publish npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip actual npm publishing (run dry-run/checks only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Align npm version with release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish package
        if: ${{ github.event.inputs.skip_publish != 'true' && (github.event_name != 'release' || (!contains(github.event.release.body, '[skip npm]') && !startsWith(github.event.release.tag_name, 'v0.1.0'))) }}
        run: npm publish --provenance --access public
        env:
          SUBEMBED_RELEASE_ASSET_RETRIES: 36
          SUBEMBED_RELEASE_ASSET_RETRY_DELAY_MS: 10000
